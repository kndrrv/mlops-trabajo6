name: ci/cd pipeline - stroke api

on:
  push:
    branches: [ main ]

jobs:
  # job 1: correr tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: clonar repositorio
        uses: actions/checkout@v4

      - name: instalar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: instalar dependencias
        run: pip install -r requirements.txt

      - name: correr tests
        run: pytest tests/ -v

  # job 2: build y push a dockerhub (solo si tests pasan)
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: clonar repositorio
        uses: actions/checkout@v4

      - name: login a dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kndrrv/stroke-api:v1.0

  # job 3: deploy en ec2 (solo si build pasa)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: deploy en ec2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull kndrrv/stroke-api:v1.0
            docker stop stroke-api || true
            docker rm stroke-api || true
            docker run -d -p 8000:8000 --name stroke-api kndrrv/stroke-api:v1.0